name: Publish Dashboard and Presentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies
        run: uv sync

      - name: Set Quarto Python
        # Apunta Quarto al Python del venv de uv para que encuentre
        # geopandas, folium y demás dependencias del proyecto
        run: echo "QUARTO_PYTHON=$(pwd)/.venv/bin/python" >> $GITHUB_ENV

      - name: Render Dashboard
        # format: html renderiza index.html in-place (no genera _site/)
        run: |
          cd dashboard
          quarto render index.qmd

      - name: Render Presentation
        # type: website genera _site/
        run: |
          cd presentacion
          quarto render

      - name: Prepare Deployment Directory
        run: |
          mkdir -p public

          # Dashboard (format: html): copiar artefactos renderizados in-place
          cp dashboard/index.html public/
          cp dashboard/styles.css public/
          cp -r dashboard/index_files public/
          cp -r dashboard/datos     public/

          # Presentación (type: website): copiar desde _site/
          mkdir -p public/presentacion
          cp -r presentacion/_site/* public/presentacion/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
